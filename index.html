<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>TAX CALC ⚡ 消費税計算機</title>
  <meta name="description" content="消費税の税込み・税抜き計算アプリ。8%・10%対応。">
  <meta name="theme-color" content="#FF006E">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-mode="inclusive">
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header__badge">⚡</div>
      <h1 class="header__title">消費税<br>計算機</h1>
      <button class="header__install" id="installBtn" hidden>📲 インストール</button>
    </header>

    <main>
      <!-- MODE TOGGLE -->
      <section class="mode-section">
        <h2 class="section-label">計算モード</h2>
        <div class="mode-toggle">
          <button class="mode-btn mode-btn--inclusive active" data-mode="inclusive">
            <span class="mode-btn__icon">📈</span>
            <span class="mode-btn__label">税込み計算</span>
            <span class="mode-btn__desc">税抜価格 → 税込価格</span>
          </button>
          <button class="mode-btn mode-btn--exclusive" data-mode="exclusive">
            <span class="mode-btn__icon">📉</span>
            <span class="mode-btn__label">税抜き計算</span>
            <span class="mode-btn__desc">税込価格 → 税抜価格</span>
          </button>
        </div>
      </section>

      <!-- RATE TOGGLE -->
      <section class="rate-section">
        <h2 class="section-label">税率</h2>
        <div class="rate-toggle">
          <button class="rate-btn rate-btn--8 active" data-rate="0.08">
            8<span class="rate-btn__percent">%</span>
            <span class="rate-btn__tag">軽減税率</span>
          </button>
          <button class="rate-btn rate-btn--10" data-rate="0.10">
            10<span class="rate-btn__percent">%</span>
            <span class="rate-btn__tag">標準税率</span>
          </button>
        </div>
      </section>

      <!-- INPUT -->
      <section class="input-section">
        <h2 class="section-label" id="inputLabel">税抜価格を入力</h2>
        <div class="input-wrapper">
          <span class="input-prefix">¥</span>
          <input
            type="text"
            inputmode="numeric"
            class="input-field"
            id="amountInput"
            placeholder="0"
            aria-labelledby="inputLabel"
            autocomplete="off"
          >
          <button class="input-clear" id="clearBtn" hidden aria-label="クリア">✕</button>
        </div>
      </section>

      <!-- RESULT -->
      <section class="result-section" id="resultSection">
        <div class="result-card">
          <div class="result-card__header">
            <span class="result-card__label" id="resultLabel">税込価格</span>
            <button class="result-card__copy" id="copyBtn" title="結果をコピー" aria-label="結果をコピー">📋</button>
          </div>
          <div class="result-card__amount">
            <span class="result-card__yen">¥</span>
            <span class="result-card__value" id="resultValue">0</span>
          </div>
          <div class="result-card__breakdown">
            <div class="breakdown-item">
              <span class="breakdown-item__label" id="breakdownOrigLabel">本体価格</span>
              <span class="breakdown-item__value" id="breakdownOrig">¥0</span>
            </div>
            <div class="breakdown-item breakdown-item--tax">
              <span class="breakdown-item__label">消費税額</span>
              <span class="breakdown-item__value" id="breakdownTax">¥0</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>TAX CALC ⚡ PWA対応 — ブラウザからインストールしてデスクトップアプリとして使えます</p>
    </footer>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
